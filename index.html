<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Line up</title>
    <link rel="stylesheet" href="css/flexboxgrid.min.css">
    <link rel="stylesheet" href="css/index.css">

</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 caja1">
                <h1>EL ARTISTA</h1>
            </div>
            <div class="col-xs-12 col-sm-12 col-md-6 col-lg-6 caja2">
                <h2>Pose Heroica</h2>
                <img src="images/Pose heorica.png" alt="Pose Heroica El Artista">
            </div>
            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-2 caja3">
                <h3>Vista Frontal</h3>
                <img src="images/Vista frontal.png" alt="Vista Frontal El Artista">
            </div>
            <div class="col-xs-6 col-sm-6 col-md-4 col-lg-2 caja4">
                <h3>Vista 3/4 Izquierda</h3>
                <img src="images/Vista 34 izquierdo.png" alt="Vista 3/4 Izquierdo El Artista">
            </div>
            <div class="col-xs-6 col-sm-6 col-md-4 col-lg-2 caja5">
                <h4>Vista Lateral Izquierdo</h4>
            </div>
            <div class="col-xs-6 col-sm-6 col-md-4 col-lg-3 caja6">
                <h3>Vista Posterior</h3>
            </div>
            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-3 caja7">
                <h3>Vista Lateral Derecho</h3>
            </div>
            <div class="col-xs-6 col-sm-6 col-md-6 col-lg-3 caja8">
                <h3>Vista 3/4 Derecha</h3>
            </div>
            <div class="col-xs-12 col-sm-12 col-md-4 col-lg-3 caja9">
                <h3>Lyp Sinc</h3>
            </div>
            <div class="col-xs-12 col-sm-12 col-md-2 col-lg-3 caja10">
                <h3>Sprite</h3>
            </div>
            <div class="col-xs-4 col-sm-4 col-md-2 col-lg-3 caja11">
                <h3>Expresión Neutra</h3>
            </div>
            <div class="col-xs-4 col-sm-4 col-md-4 col-lg-3 caja12">
                <h3>Expresión Enojado</h3>
            </div>
            <div class="col-xs-4 col-sm-4 col-md-5 col-lg-3 caja13">
                <h3>Expresión Triste</h3>
            </div>
            <div class="col-xs-6 col-sm-6 col-md-2 col-lg-6 caja14">
                <h3>Expresión Asustado</h3>
            </div>
            <div class="col-xs-6 col-sm-6 col-md-5 col-lg-6 caja15">
                <h3>Expresión Feliz</h3>
            </div>
        </div>
    </div>
</body>
